<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Exemplo com sidebar</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a class="skip-link" href="#slide-1">Pular para os slides</a>
  <div class="layout">
    <aside class="sidebar">
      <header class="sidebar__head">
        <p>Presentation Factory</p>
        <h1>Título do deck</h1>
      </header>
      <nav class="sidebar-nav" aria-label="Índice">
        <a class="nav-item active" href="#slide-1" data-target="slide-1">01 Abertura</a>
        <a class="nav-item" href="#slide-2" data-target="slide-2">02 Contexto</a>
        <a class="nav-item" href="#slide-3" data-target="slide-3">03 Ação</a>
      </nav>
      <div class="sidebar-controls">
        <button id="btn-all">Início</button>
        <button id="btn-fullscreen" aria-pressed="false">Tela cheia</button>
        <button id="btn-loop" aria-pressed="false">Loop</button>
        <button id="btn-print">Imprimir / PDF</button>
      </div>
    </aside>
    <main class="viewer">
      <section class="slide in-view" id="slide-1" aria-labelledby="title-1">
        <div class="slide__content"><h2 id="title-1">Mensagem de abertura</h2></div>
      </section>
      <section class="slide" id="slide-2" aria-labelledby="title-2">
        <div class="slide__content"><h2 id="title-2">Contexto confirmado</h2></div>
      </section>
      <section class="slide" id="slide-3" aria-labelledby="title-3">
        <div class="slide__content"><h2 id="title-3">Próxima decisão</h2></div>
      </section>
    </main>
  </div>
  <script src="deck.js"></script>
</body>
</html>
