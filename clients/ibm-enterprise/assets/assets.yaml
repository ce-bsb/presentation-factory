assets:
  - path: assets/img/logo.svg
    type: logo
    owner: IBM Enterprise
    purpose: IBM Enterprise brand logo
    use_when:
      - organization branding
      - header or cover slide
  - path: assets/img/favicon.svg
    type: icon
    owner: IBM Enterprise
    purpose: browser favicon for IBM decks
    use_when:
      - generated workspace favicon
  - path: assets/css/styles.css
    type: stylesheet
    owner: IBM Enterprise
    purpose: IBM visual theme for standard deck templates
    use_when:
      - IBM presentation
