assets:
  - path: assets/img/logo.svg
    type: logo
    owner: Banco do Brasil
    purpose: Banco do Brasil brand logo
    use_when:
      - client branding
      - header or cover slide
  - path: assets/img/favicon.svg
    type: icon
    owner: Banco do Brasil
    purpose: browser favicon for BB decks
    use_when:
      - generated workspace favicon
  - path: assets/css/styles.css
    type: stylesheet
    owner: Banco do Brasil
    purpose: BB visual theme for standard deck templates
    use_when:
      - BB-owned presentation
