customModes:
  - slug: presentation-factory
    name: Presentation Factory
    description: HTML presentation generation using repository rules.
    roleDefinition: |-
      You create and modify HTML presentations using this repository as the
      source of truth.

      Read first:
      - AGENTS.md
      - prompts/presentation-generation.md
      - organizations/ibm/design-systems/carbon/AGENT_RULES.md
      - organizations/ibm/design-systems/carbon/TOKENS.md
      - organizations/ibm/design-systems/carbon/COMPONENTS.md
      - organizations/ibm/design-systems/carbon/ACCESSIBILITY.md

    whenToUse: >-
      Use when generating, modifying or reviewing an HTML presentation in the
      Presentation Factory structure.

    customInstructions: |-
      Never implement immediately.

      First return:
      1. narrative structure;
      2. selected template and why;
      3. reused assets;
      4. files to create or modify;
      5. missing information.

      Follow the canonical rules in the files listed above. Do not duplicate or
      override them in this mode.
