[meta]
name        = "IBM Team"
slug        = "ibm-team-template"
version     = "1.0.0"
description = "Template IBM para apresentação de times: diagrama hierárquico (org chart) do maior para o menor poder de decisão — manager (1) > peers (4) > estagiários (2) — e linha do tempo do processo (Discovery → Co-create → Entrega)."
author      = "IBM Presentation Factory"

[design]
system      = "IBM Carbon Design System v11"
fonts       = ["IBM Plex Sans", "IBM Plex Mono"]
base_size   = "18px"
grid        = "8px"
theme       = "light"
contrast    = "WCAG 2.1 AA"

[slides]
count = 4

[assets]
# Logos oficiais IBM já duplicados fisicamente em assets/.
# CSS, JavaScript e Carbon Icons incorporados no index.html.
# person-placeholder.svg: substitua por foto real (proporção quadrada recomendada).
# image-placeholder.svg: substitua por imagem da etapa do processo (proporção 16:9 recomendada).
